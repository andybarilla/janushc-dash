version: "2"
sql:
  - engine: "sqlite"
    queries: "queries/"
    schema: "migrations/"
    gen:
      go:
        package: "database"
        out: "internal/database"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "UUID"
            go_type: "github.com/jackc/pgtype.UUID"
          - db_type: "UUID"
            nullable: true
            go_type: "github.com/jackc/pgtype.UUID"
          - db_type: "TIMESTAMPTZ"
            go_type: "github.com/jackc/pgtype.Timestamptz"
          - db_type: "TIMESTAMPTZ"
            nullable: true
            go_type: "github.com/jackc/pgtype.Timestamptz"
          - db_type: "DATE"
            go_type: "github.com/jackc/pgtype.Date"
          - db_type: "NUMERIC"
            nullable: true
            go_type: "github.com/jackc/pgtype.Numeric"
          - db_type: "NUMERIC(12,3)"
            nullable: true
            go_type: "github.com/jackc/pgtype.Numeric"
          - db_type: "TEXT"
            nullable: true
            go_type: "github.com/jackc/pgtype.Text"
          - db_type: "INTEGER"
            nullable: true
            go_type: "github.com/jackc/pgtype.Int4"
          - db_type: "BIGINT"
            nullable: true
            go_type: "github.com/jackc/pgtype.Int8"
          - db_type: "JSONB"
            go_type: "github.com/jackc/pgtype.JSONB"
          - db_type: "JSONB"
            nullable: true
            go_type: "github.com/jackc/pgtype.JSONB"
