name: janushc-dash
type: single
services:
    api:
        command: /workspaces/janushc-dash/.rook/scripts/start-api.sh
        ports:
            - 8080
        environment:
            CORS_ORIGIN: http://{{.Host.frontend}}:{{.Port.frontend}}
            DATABASE_URL: postgres://janushc-dash:janushc-dash@{{.Host.postgres}}:{{.Port.postgres}}/janushc-dash?sslmode=disable
            DEVCONTAINER: "true"
        depends_on:
            - postgres
        volumes:
            - ./.:/workspaces/janushc-dash:cached
        env_file: .env
        build: .
        dockerfile: .rook/Dockerfile.api
    frontend:
        command: /workspaces/janushc-dash/.rook/scripts/start-frontend.sh
        ports:
            - 3000
        environment:
            API_URL: http://{{.Host.api}}:{{.Port.api}}
            VITE_PORT: "3000"
        env_file: .env
        depends_on:
            - api
        volumes:
            - ./.:/workspaces/janushc-dash:cached
        build: .
        dockerfile: .rook/Dockerfile.frontend
    postgres:
        image: postgres:16-alpine
        ports:
            - 5432
        environment:
            POSTGRES_DB: janushc-dash
            POSTGRES_PASSWORD: janushc-dash
            POSTGRES_USER: janushc-dash
        volumes:
            - postgres_data:/var/lib/postgresql/data
