services:
  api:
    build:
      context: .
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "127.0.0.1:${EXTERNAL_PORT:-8080}:8080"
    env_file: .env
    environment:
      PORT: "8080"
      DATABASE_URL: "/app/data/janushc-dash.db"
      SCRIBE_AUDIO_DIR: "/app/tmp/scribe-audio"
    volumes:
      - ./data:/app/data
      - ./recordings:/app/recordings
      - scribe_audio:/app/tmp/scribe-audio
    restart: unless-stopped

volumes:
  sqlite_data:
  scribe_audio:
