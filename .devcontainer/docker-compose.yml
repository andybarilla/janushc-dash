services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/emrai:cached
    command: /workspaces/emrai/.devcontainer/start.sh
    env_file: ../.env
    environment:
      DEVCONTAINER: "true"
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
      - "${NEXT_PORT:-3000}:${NEXT_PORT:-3000}"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-emrai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emrai}
      POSTGRES_DB: ${POSTGRES_DB:-emrai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emrai}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
