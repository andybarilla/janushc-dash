<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Janus Scribe — Mobile</title>
  <link rel="icon" href="assets/favicon.svg" />
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="mobile-scribe.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #FAFBFC; }
    body { font-family: var(--font-sans); color: var(--text-dark); }
    .dc-page-header {
      padding: 28px 36px 14px;
      font-family: var(--font-sans);
    }
    .dc-page-header h1 {
      font-family: var(--font-sans);
      font-size: 22px;
      font-weight: 700;
      color: var(--primary-color);
      margin: 0;
      letter-spacing: -0.01em;
    }
    .dc-page-header p {
      margin: 6px 0 0;
      color: var(--text-light);
      font-size: 13.5px;
      max-width: 720px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="dc-page-header">
    <h1>Scribe · Mobile</h1>
    <p>
      Phone-sized companion to the desktop Scribe screen. Tap any encounter to drill in; the same per-section approval, transcript, and LLM-feedback flows are preserved, with the feedback sheet sliding up from the bottom. Each frame below is independently interactive.
    </p>
  </div>

  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>

  <!-- Data + frame + canvas helpers -->
  <script src="scribe-data.js"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="mobile-scribe.jsx"></script>

  <script type="text/babel">
    // Each artboard renders MobileScribeApp seeded into a different state.
    const FRAME_W = 402;
    const FRAME_H = 874;
    const ART_W = FRAME_W + 24;
    const ART_H = FRAME_H + 80;   // room for caption

    function Frame({ children, title, subtitle }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          <IOSDevice width={FRAME_W} height={FRAME_H} title={undefined}>
            {children}
          </IOSDevice>
          <div className="m-frame-label">
            <strong>{title}</strong>
            <span>{subtitle}</span>
          </div>
        </div>
      );
    }

    function Page() {
      return (
        <DesignCanvas storageKey="janus-scribe-mobile" initialScale={0.7}>
          <DCSection id="screens" title="Mobile Scribe" subtitle="Tap to navigate · each phone is independently interactive">
            <DCArtboard id="list-default" label="Inbox" width={ART_W} height={ART_H} style={{ background: 'transparent', boxShadow: 'none' }}>
              <Frame title="Inbox" subtitle="Today's encounters with quick stats and status filter">
                <MobileScribeApp initialView="list" initialStatusFilter="all" />
              </Frame>
            </DCArtboard>

            <DCArtboard id="list-ready" label="Ready filter" width={ART_W} height={ART_H} style={{ background: 'transparent', boxShadow: 'none' }}>
              <Frame title="Filtered: Ready" subtitle="Only encounters awaiting review">
                <MobileScribeApp initialView="list" initialStatusFilter="ready" />
              </Frame>
            </DCArtboard>

            <DCArtboard id="detail-ready" label="Review" width={ART_W} height={ART_H} style={{ background: 'transparent', boxShadow: 'none' }}>
              <Frame title="Review encounter" subtitle="Per-section approval, audio, sticky Send bar">
                <MobileScribeApp initialView="detail" initialEncounterId="enc_001" />
              </Frame>
            </DCArtboard>

            <DCArtboard id="detail-approved" label="Approved" width={ART_W} height={ART_H} style={{ background: 'transparent', boxShadow: 'none' }}>
              <Frame title="All approved" subtitle='"Send to EHR" enabled when every section is approved'>
                <MobileScribeApp
                  initialView="detail"
                  initialEncounterId="enc_001"
                  encountersSeed={ENCOUNTERS.map(e => e.id === 'enc_001' ? { ...e, approvals: { hpi: true, plan: true, exam: true, labs: true } } : e)}
                />
              </Frame>
            </DCArtboard>

            <DCArtboard id="feedback-sheet" label="Feedback sheet" width={ART_W} height={ART_H} style={{ background: 'transparent', boxShadow: 'none' }}>
              <Frame title="Feedback sheet" subtitle="Bottom sheet to flag missed info, hallucinations, etc.">
                <MobileScribeApp
                  initialView="detail"
                  initialEncounterId="enc_001"
                  initialNotesOpen={true}
                />
              </Frame>
            </DCArtboard>
          </DCSection>

          <DCSection id="states" title="Pipeline states" subtitle="What the detail view looks like before a record is ready or when it fails">
            <DCArtboard id="state-pipeline" label="Transcribing" width={ART_W} height={ART_H} style={{ background: 'transparent', boxShadow: 'none' }}>
              <Frame title="In pipeline" subtitle="Live pipeline tracker · structured output hasn't arrived yet">
                <MobileScribeApp initialView="detail" initialEncounterId="enc_006" />
              </Frame>
            </DCArtboard>

            <DCArtboard id="state-failed" label="Failed" width={ART_W} height={ART_H} style={{ background: 'transparent', boxShadow: 'none' }}>
              <Frame title="Failed" subtitle="AWS HealthScribe couldn't transcribe · retry inline">
                <MobileScribeApp initialView="detail" initialEncounterId="enc_008" />
              </Frame>
            </DCArtboard>

            <DCArtboard id="state-ehr-failed" label="EHR sync failed" width={ART_W} height={ART_H} style={{ background: 'transparent', boxShadow: 'none' }}>
              <Frame title="EHR sync failed" subtitle="Content approved · EHR sync needs retry">
                <MobileScribeApp initialView="detail" initialEncounterId="enc_004" />
              </Frame>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
  </script>
</body>
</html>
