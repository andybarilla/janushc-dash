services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-janushc-dash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-janushc-dash}
      POSTGRES_DB: ${POSTGRES_DB:-janushc-dash}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-janushc-dash}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
